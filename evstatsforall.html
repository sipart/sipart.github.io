<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic EV Charging Summary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .savings-gradient { background: linear-gradient(135deg, #10B981, #14B8A6); }
        .comparison-gradient { background: linear-gradient(135deg, #EF4444, #F97316); }
        input[type="number"], input[type="date"] {
            @apply block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border;
        }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        
        <div class="bg-white p-6 rounded-lg shadow-lg mb-8 border-t-4 border-indigo-500">
            <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center">
                <svg class="w-6 h-6 mr-2 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                Dashboard Settings
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <div>
                    <label class="block text-xs font-medium text-gray-700 uppercase">Start Date</label>
                    <input type="date" id="input-startDate" value="2024-04-11">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-700 uppercase">End Date</label>
                    <input type="date" id="input-endDate" value="2026-02-19">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-700 uppercase">Total Miles</label>
                    <input type="number" id="input-miles" value="21155">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-700 uppercase">Petrol MPG</label>
                    <input type="number" id="input-mpg" value="40">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-700 uppercase">Petrol £/Gallon</label>
                    <input type="number" step="0.01" id="input-fuelCost" value="5.99">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-700 uppercase">Home kWh / £ Rate</label>
                    <div class="flex space-x-2">
                        <input type="number" id="input-kwhHome" value="5194.8" title="kWh">
                        <input type="number" step="0.01" id="input-rateHome" value="0.07" title="Rate">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-700 uppercase">Public kWh / £ Rate</label>
                    <div class="flex space-x-2">
                        <input type="number" id="input-kwhPublic" value="205.2" title="kWh">
                        <input type="number" step="0.01" id="input-ratePublic" value="0.51" title="Rate">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-700 uppercase">Free kWh</label>
                    <input type="number" id="input-kwhFree" value="169.0">
                </div>
            </div>
        </div>

        <header class="mb-8 text-center">
            <h1 class="text-3xl md:text-4xl font-bold text-gray-800">EV Charging Summary</h1>
            <p id="display-date" class="text-lg md:text-xl text-gray-600">Loading...</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-lg shadow-lg flex items-center space-x-4">
                <div class="text-blue-500 font-bold text-xl">Miles</div>
                <div><div id="display-miles" class="text-3xl font-bold text-gray-900">-</div></div>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-lg flex items-center space-x-4">
                <div class="text-red-500 font-bold text-xl">Cost</div>
                <div><div id="display-ev-cost" class="text-3xl font-bold text-gray-900">-</div></div>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-lg flex items-center space-x-4">
                <div class="text-green-500 font-bold text-xl">Per Mile</div>
                <div><div id="display-ev-cpm" class="text-3xl font-bold text-gray-900">-</div></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 bg-white p-6 rounded-lg shadow-lg">
                <h2 class="text-xl font-bold text-gray-800 mb-4">Charging Breakdown</h2>
                <div class="w-full rounded-full h-8 bg-gray-200 flex overflow-hidden mb-4">
                    <div id="bar-home" class="h-full bg-blue-500" style="width: 0%"></div>
                    <div id="bar-public" class="h-full bg-yellow-500" style="width: 0%"></div>
                    <div id="bar-free" class="h-full bg-gray-400" style="width: 0%"></div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="border-l-4 border-blue-500 pl-4">
                        <div class="text-lg font-semibold text-gray-800">Home</div>
                        <div id="home-pct" class="text-2xl font-bold text-blue-600">0%</div>
                        <div id="home-kwh-display" class="text-sm text-gray-600">-</div>
                        <div id="home-cost-display" class="text-sm text-gray-600">-</div>
                    </div>
                    <div class="border-l-4 border-yellow-500 pl-4">
                        <div class="text-lg font-semibold text-gray-800">Public</div>
                        <div id="public-pct" class="text-2xl font-bold text-yellow-600">0%</div>
                        <div id="public-kwh-display" class="text-sm text-gray-600">-</div>
                        <div id="public-cost-display" class="text-sm text-gray-600">-</div>
                    </div>
                    <div class="border-l-4 border-gray-400 pl-4">
                        <div class="text-lg font-semibold text-gray-800">Free</div>
                        <div id="free-pct" class="text-2xl font-bold text-gray-500">0%</div>
                        <div id="free-kwh-display" class="text-sm text-gray-600">-</div>
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-lg">
                <h2 class="text-xl font-bold text-gray-800 mb-4">Efficiency</h2>
                <div id="display-total-kwh" class="text-2xl font-bold">- kWh total</div>
                <div id="display-efficiency" class="text-2xl font-bold text-green-600">- miles/kWh</div>
            </div>

            <div class="lg:col-span-3 grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="comparison-gradient p-6 rounded-lg shadow-lg text-white">
                    <h2 class="text-xl font-bold mb-2">Petrol Est.</h2>
                    <div id="display-petrol-cost" class="text-4xl font-bold mb-2">-</div>
                    <div id="display-petrol-cpm" class="opacity-90">- per mile</div>
                </div>
                <div class="savings-gradient p-6 rounded-lg shadow-lg text-white">
                    <h2 class="text-xl font-bold mb-2">Total Savings</h2>
                    <div id="display-savings-total" class="text-4xl font-bold mb-2">-</div>
                    <div id="display-savings-weekly" class="opacity-90">- per week</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const inputs = [
            'startDate', 'endDate', 'miles', 'mpg', 'fuelCost', 
            'kwhHome', 'rateHome', 'kwhPublic', 'ratePublic', 'kwhFree'
        ];

        function calculateAndRender() {
            // 1. Get values from inputs
            const val = (id) => document.getElementById(`input-${id}`).value;
            const num = (id) => parseFloat(val(id)) || 0;

            const config = {
                startDate: val('startDate'),
                endDate: val('endDate'),
                totalMiles: num('miles'),
                mpg: num('mpg'),
                fuelCostPerGallon: num('fuelCost'),
                kwh: { home: num('kwhHome'), public: num('kwhPublic'), free: num('kwhFree') },
                rates: { home: num('rateHome'), public: num('ratePublic') }
            };

            // 2. Calculations
            const start = new Date(config.startDate);
            const end = new Date(config.endDate);
            const weeks = Math.round(Math.abs(end - start) / (1000 * 60 * 60 * 24 * 7)) || 1;
            
            const totalKwh = config.kwh.home + config.kwh.public + config.kwh.free;
            const costHome = config.kwh.home * config.rates.home;
            const costPublic = config.kwh.public * config.rates.public;
            const totalEVCost = costHome + costPublic;

            const evCPM = (config.totalMiles > 0) ? (totalEVCost / config.totalMiles) * 100 : 0;
            const efficiency = (totalKwh > 0) ? config.totalMiles / totalKwh : 0;

            const petrolCost = (config.totalMiles / (config.mpg || 1)) * config.fuelCostPerGallon;
            const petrolCPM = (config.totalMiles > 0) ? (petrolCost / config.totalMiles) * 100 : 0;

            const totalSavings = petrolCost - totalEVCost;
            const weeklySavings = totalSavings / weeks;

            // 3. UI Update
            const fmtMoney = (n) => "£" + n.toLocaleString('en-GB', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            const fmtNum = (n) => n.toLocaleString('en-GB');
            const pct = (part) => totalKwh > 0 ? ((part / totalKwh) * 100).toFixed(1) : 0;

            document.getElementById('display-date').textContent = `${start.toLocaleDateString()} – ${end.toLocaleDateString()} (~${weeks} weeks)`;
            document.getElementById('display-miles').textContent = fmtNum(config.totalMiles);
            document.getElementById('display-ev-cost').textContent = fmtMoney(totalEVCost);
            document.getElementById('display-ev-cpm').textContent = evCPM.toFixed(1) + "p";

            document.getElementById('bar-home').style.width = pct(config.kwh.home) + "%";
            document.getElementById('bar-public').style.width = pct(config.kwh.public) + "%";
            document.getElementById('bar-free').style.width = pct(config.kwh.free) + "%";

            document.getElementById('home-pct').textContent = pct(config.kwh.home) + "%";
            document.getElementById('home-kwh-display').textContent = fmtNum(config.kwh.home) + " kWh";
            document.getElementById('home-cost-display').textContent = fmtMoney(costHome) + " total";

            document.getElementById('public-pct').textContent = pct(config.kwh.public) + "%";
            document.getElementById('public-kwh-display').textContent = fmtNum(config.kwh.public) + " kWh";
            document.getElementById('public-cost-display').textContent = fmtMoney(costPublic) + " total";

            document.getElementById('free-pct').textContent = pct(config.kwh.free) + "%";
            document.getElementById('free-kwh-display').textContent = fmtNum(config.kwh.free) + " kWh";

            document.getElementById('display-total-kwh').textContent = fmtNum(Math.round(totalKwh)) + " kWh total";
            document.getElementById('display-efficiency').textContent = efficiency.toFixed(1) + " miles/kWh";

            document.getElementById('display-petrol-cost').textContent = fmtMoney(petrolCost);
            document.getElementById('display-petrol-cpm').textContent = "~" + petrolCPM.toFixed(1) + "p per mile";

            document.getElementById('display-savings-total').textContent = fmtMoney(totalSavings);
            document.getElementById('display-savings-weekly').textContent = fmtMoney(weeklySavings) + " per week";
        }

        // Attach event listeners to all inputs
        inputs.forEach(id => {
            document.getElementById(`input-${id}`).addEventListener('input', calculateAndRender);
        });

        // Initial Run
        calculateAndRender();
    </script>
</body>
</html>
