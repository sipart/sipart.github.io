<head>
    <meta charset="UTF-8">

    <style>
        :root {
            --bg-color: #1a1a1a;
            --panel-bg: #2d2d2d;
            --text-color: #ffffff;
            --accent-color: #ff4757;
            --accent-hover: #ff6b81;
            --border-color: #444;
            --selected-bg: #2ed573;
            --overlap-bg: #ffa502;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 20px;
        }

        h1 { margin: 0 0 10px 0; color: var(--accent-color); }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .tab-btn {
            background: var(--panel-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .tab-btn:hover { background: var(--border-color); }
        .tab-btn.active {
            background: var(--accent-color);
            border-color: var(--accent-color);
        }

        .layout-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            align-items: start;
        }

        @media (max-width: 1024px) {
            .layout-container { grid-template-columns: 1fr; }
        }

        .panel {
            background: var(--panel-bg);
            border-radius: 6px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .panel h2 { margin-top: 0; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }

        .stage-group { margin-bottom: 20px; }
        .stage-title {
            font-weight: bold;
            color: var(--accent-hover);
            margin-bottom: 8px;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        .band-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 10px;
        }

        .band-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
        }

        .band-card:hover { background: rgba(255,255,255,0.1); }
        .band-card.selected {
            background: rgba(46, 213, 115, 0.2);
            border-color: var(--selected-bg);
        }

        .band-name { font-weight: bold; font-size: 14px; margin-bottom: 4px; }
        .band-time { font-size: 12px; color: #aaa; }

        .schedule-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sched-item {
            display: grid;
            grid-template-columns: 90px 1fr 1fr;
            padding: 12px;
            background: rgba(255,255,255,0.03);
            border-left: 4px solid var(--selected-bg);
            border-radius: 0 4px 4px 0;
            font-size: 14px;
        }

        .sched-item.clash {
            border-left-color: var(--overlap-bg);
            background: rgba(255, 165, 2, 0.1);
        }

        .sched-time { font-weight: bold; }
        .sched-name { font-weight: bold; color: #fff; }
        .sched-stage { color: #aaa; font-style: italic; text-align: right; }
        
        .clash-warning {
            grid-column: 1 / -1;
            color: var(--overlap-bg);
            font-size: 12px;
            margin-top: 5px;
            font-weight: bold;
        }

        .empty-prompt { color: #888; text-align: center; padding: 4px 0; }
    </style>
</head>

        // Track selected bands by ID: "Day|Stage|BandName"
        let selectedBands = new Set();
        let currentDay = Object.keys(festivalData)[0];

        // Load selections from localStorage if they exist
        if(localStorage.getItem('rebellion_selections')) {
            try {
                selectedBands = new Set(JSON.parse(localStorage.getItem('rebellion_selections')));
            } catch(e) { console.error(e); }
        }

        // Convert time string "HH:MM" into minutes from start of day for comparison calculations
        function timeToMins(timeStr) {
            let [h, m] = timeStr.split(':').map(Number);
            // Handle sets stretching past midnight
            if (h < 5) h += 24; 
            return (h * 60) + m;
        }

        // Check if two acts overlap
        function isClashing(act1, act2) {
            const start1 = timeToMins(act1.start);
            const end1 = timeToMins(act1.end);
            const start2 = timeToMins(act2.start);
            const end2 = timeToMins(act2.end);
            return start1 < end2 && start2 < end1;
        }

        function saveSelections() {
            localStorage.setItem('rebellion_selections', JSON.stringify([...selectedBands]));
        }

        function initTabs() {
            const container = document.getElementById('dayTabs');
            Object.keys(festivalData).forEach((day, index) => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${day === currentDay ? 'active' : ''}`;
                btn.innerText = day;
                btn.onclick = () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentDay = day;
                    render();
                };
                container.appendChild(btn);
            });
        }

        function toggleBand(day, stage, band) {
            const id = `${day}|${stage}|${band.name}`;
            if(selectedBands.has(id)) {
                selectedBands.delete(id);
            } else {
                selectedBands.add(id);
            }
            saveSelections();
            render();
        }

        function render() {
            document.getElementById('selectionTitle').innerText = `${currentDay} - Lineup Selection`;
            document.getElementById('scheduleTitle').innerText = `${currentDay} - My Schedule`;

            renderLineup();
            renderSchedule();
        }

        function renderLineup() {
            const container = document.getElementById('lineupContainer');
            container.innerHTML = '';

            const dayData = festivalData[currentDay];
            Object.keys(dayData).forEach(stage => {
                const stageGroup = document.createElement('div');
                stageGroup.className = 'stage-group';

                const title = document.createElement('div');
                title.className = 'stage-title';
                title.innerText = stage;
                stageGroup.appendChild(title);

                const grid = document.createElement('div');
                grid.className = 'band-grid';

                dayData[stage].forEach(band => {
                    const id = `${currentDay}|${stage}|${band.name}`;
                    const card = document.createElement('div');
                    card.className = `band-card ${selectedBands.has(id) ? 'selected' : ''}`;
                    
                    card.innerHTML = `
                        <div class="band-name">${band.name}</div>
                        <div class="band-time">${band.start} - ${band.end}</div>
                    `;
                    card.onclick = () => toggleBand(currentDay, stage, band);
                    grid.appendChild(card);
                });

                stageGroup.appendChild(grid);
                container.appendChild(stageGroup);
            });
        }

        function renderSchedule() {
            const container = document.getElementById('myScheduleContainer');
            container.innerHTML = '';

            // Filter out selections belonging to the active day view
            let activeSelections = [];
            selectedBands.forEach(id => {
                const [day, stage, name] = id.split('|');
                if (day === currentDay) {
                    const act = festivalData[day][stage].find(b => b.name === name);
                    if(act) {
                        activeSelections.push({ ...act, stage });
                    }
                }
            });

            if(activeSelections.length === 0) {
                container.innerHTML = '<p class="empty-prompt">No bands selected for this day yet. Click on bands on the left panel to populate your schedule!</p>';
                return;
            }

            // Sort schedule Chronologically
            activeSelections.sort((a, b) => timeToMins(a.start) - timeToMins(b.start));

            const list = document.createElement('div');
            list.className = 'schedule-list';

            activeSelections.forEach((act, index) => {
                const item = document.createElement('div');
                item.className = 'sched-item';

                // Look for overlaps across all other choices for the day
                let clashes = activeSelections.filter((other, idx) => idx !== index && isClashing(act, other));
                
                if(clashes.length > 0) {
                    item.classList.add('clash');
                }

                let clashMessage = '';
                if(clashes.length > 0) {
                    clashMessage = `<div class="clash-warning">⚠️ Clashes with: ${clashes.map(c => c.name).join(', ')}</div>`;
                }

                item.innerHTML = `
                    <div class="sched-time">${act.start} - ${act.end}</div>
                    <div class="sched-name">${act.name}</div>
                    <div class="sched-stage">${act.stage}</div>
                    ${clashMessage}
                `;
                list.appendChild(item);
            });

            container.appendChild(list);
        }

        // Execute initialization routines on window mount
        initTabs();
        render();
